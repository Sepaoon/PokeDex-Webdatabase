<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PokeDexCheck</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
            transition: background-color 0.25s, color 0.25s;
        }

        /* ── Hide TCG buttons setting ── */
        body.hide-tcg .price-btn,
        body.hide-tcg .tcg-btn { display: none !important; }

        /* ── Light Mode ── */
        body.light { background-color: #dce8f5; color: #1a1a1a; }
        body.light #banner-container { background-color: #c8dcf0; border-bottom-color: #1a73e8; }
        body.light #last-updated-bar { background: #ccdeed; border-bottom-color: #b8cfe0; color: #777; }
        body.light #last-updated-bar span { color: #444; }
        body.light .header { background-color: #d0e4f4; border-bottom-color: #b8cfe0; box-shadow: 0 2px 12px rgba(0,80,160,0.1); }
        body.light .nav-brand .brand-name { color: #1a1a1a; }
        body.light .nav-brand .brand-sub  { color: #5a7a99; }
        body.light .nav-divider { background: #b8cfe0; }
        body.light .nav-search { background: #c8dcf0; border-color: #a8c0d8; }
        body.light .nav-search input { color: #1a1a1a; }
        body.light .nav-search input::placeholder { color: #7a9ab5; }
        body.light .nav-search-sep { color: #a8c0d8; }
        body.light .nav-search-btn { color: #1a73e8; }
        body.light #total-value-display { background: #c8dcf0; border-color: #a8c0d8; color: #334; }
        body.light #total-value-display strong { color: #1a1a1a; }
        body.light .nav-btn { background: #c0d8ee; color: #334; }
        body.light .settings-toggle-btn { border-color: #a8c0d8; color: #5a7a99; }
        body.light .nav-settings-bar { border-top-color: #b8cfe0; }
        body.light .nav-settings-bar input[type="number"] { border-color: #a8c0d8; background: #c8dcf0; color: #1a1a1a; }
        body.light .settings-label { color: #5a7a99; }
        body.light .nav-page-group input { border-color: #a8c0d8; background: #c8dcf0; color: #1a1a1a; }
        body.light .nav-page-group button { background: #b8d0e8; color: #334; border-color: #a0b8d0; }
        body.light .page-header { background: #d0e4f4; border-color: #b0cae0; }
        body.light .page-header:active { background: #c0d8ee; }
        body.light .page-header-label { color: #5a7a99; }
        body.light .page-header-line { background: linear-gradient(to right, #b8cfe0, transparent); }
        body.light .page-header-stats { color: #7a9ab5; }
        body.light .page-body { border-color: #b8cfe0; }
        body.light .item-row { background-color: #e4f0fb; }
        body.light .item-row.highlight { background-color: #fff3cc; }
        body.light .item-number { color: #5a7a99; }
        body.light .item-location { color: #8aaac5; }
        body.light .item-name, body.light .item-set, body.light .item-set-number, body.light .item-value {
            border-color: #a8c0d8; background: #d8ecf8; color: #1a1a1a;
        }
        body.light .value-prefix { color: #5a7a99; }
        body.light .tcg-btn { background: #1a73e8; border-color: #1558b0; }
        body.light .photo-btn { background: #c8dcf0; border-color: #a8c0d8; color: #5a7a99; }
        body.light .checkbox-label { color: #334; }
        body.light .set-dropdown { background: #d8ecf8; border-color: #1a73e8; }
        body.light .set-dropdown-item { color: #334; border-bottom-color: #c0d8ee; }
        body.light .set-dropdown-item:hover, body.light .set-dropdown-item.active { background: #bcd4f0; color: #1a1a1a; }
        body.light .set-dropdown-item .set-count { color: #7a9ab5; }
        body.light #banner-modal-overlay { background: rgba(0,0,0,0.5); }
        body.light #banner-modal { background: #d8ecf8; border-color: #b8cfe0; }
        body.light #banner-modal h2 { color: #1a1a1a; }
        body.light #banner-modal p { color: #5a7a99; }
        body.light .bm-choice { background: #c8dcf0; border-color: #a8c0d8; color: #334; }
        body.light .bm-choice:active, body.light .bm-choice.selected { border-color: #1a73e8; background: #bcd4f0; color: #1a1a1a; }
        body.light #bm-input-area input[type="text"] { border-color: #a8c0d8; background: #c8dcf0; color: #1a1a1a; }
        body.light #bm-cancel { background: #c0d8ee; color: #445; }
        body.light .price-btn { background: #e8f5e9; border-color: #a5d6a7; color: #388e3c; }
        body.light .price-btn.error { background: #ffebee; border-color: #ef9a9a; color: #c62828; }
        /* Light mode theme toggle in settings */
        body.light .settings-theme-row { border-top-color: #b8cfe0; }
        body.light .settings-theme-label { color: #5a7a99; }

        /* ── Banner ── */
        #banner-container {
            width: 100%;
            height: clamp(120px, 25vw, 250px);
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 2px solid #007bff;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #banner-img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            transition: filter 0.2s;
        }
        #banner-container:hover #banner-img,
        #banner-container:active #banner-img { filter: brightness(0.5); }
        #banner-hint {
            position: absolute; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            opacity: 0; transition: opacity 0.2s;
            color: #fff; font-size: 1em; font-weight: bold; text-shadow: 0 1px 6px #000;
        }
        #banner-hint svg { width: 36px; height: 36px; }
        #banner-container:hover #banner-hint,
        #banner-container:active #banner-hint { opacity: 1; }

        /* ── Banner Modal ── */
        #banner-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.78); z-index: 200;
            justify-content: center; align-items: center; padding: 16px;
        }
        #banner-modal-overlay.open { display: flex; }
        #banner-modal {
            background: #1e1e1e; border: 1px solid #444; border-radius: 12px;
            padding: 24px 20px; width: 100%; max-width: 430px;
            box-shadow: 0 8px 36px rgba(0,0,0,0.65);
        }
        #banner-modal h2 { margin: 0 0 4px; font-size: 1.1em; color: #fff; }
        #banner-modal p  { margin: 0 0 18px; font-size: 0.82em; color: #999; }
        .bm-choices { display: flex; gap: 12px; margin-bottom: 18px; }
        .bm-choice {
            flex: 1; padding: 16px 10px; border: 2px solid #444; border-radius: 10px;
            background: #2a2a2a; color: #ccc; cursor: pointer; text-align: center;
            font-size: 0.9em; font-weight: bold;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .bm-choice:active, .bm-choice.selected { border-color: #007bff; background: #1a2a3a; color: #fff; }
        .bm-choice .bm-icon { font-size: 2em; display: block; margin-bottom: 8px; }
        #bm-input-area { margin-bottom: 18px; min-height: 42px; }
        #bm-input-area input[type="text"] {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid #555; background: #2a2a2a; color: #fff;
            font-size: 16px; /* prevents iOS zoom */
        }
        #bm-input-area input[type="file"] { color: #ccc; font-size: 13px; margin-top: 4px; }
        .bm-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .bm-actions button {
            padding: 10px 22px; border-radius: 6px; border: none;
            font-size: 15px; font-weight: bold; cursor: pointer; min-height: 44px;
        }
        #bm-cancel { background: #333; color: #bbb; }
        #bm-apply  { background: #007bff; color: #fff; }

        /* ── Last Updated ── */
        #last-updated-bar {
            background: #161616; border-bottom: 1px solid #2a2a2a;
            padding: 5px 14px; font-size: 0.72em; color: #555;
            text-align: right; letter-spacing: 0.02em;
        }
        #last-updated-bar span { color: #777; font-weight: bold; }

        /* ── Sticky Navbar ── */
        .header {
            position: sticky; top: 0;
            background-color: #1a1a1a;
            box-shadow: 0 2px 12px rgba(0,0,0,0.6);
            z-index: 100; border-bottom: 1px solid #2a2a2a;
        }
        .nav-main {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; flex-wrap: nowrap; min-height: 54px;
        }
        .nav-brand { display: flex; flex-direction: column; line-height: 1.15; flex-shrink: 0; }
        .nav-brand .brand-name { font-size: 1.05em; font-weight: 800; color: #fff; white-space: nowrap; }
        .nav-brand .brand-sub  { font-size: 0.6em; color: #555; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
        .nav-divider { width: 1px; height: 28px; background: #333; flex-shrink: 0; }

        .nav-search {
            display: flex; align-items: center; flex: 1; min-width: 0; gap: 4px;
            background: #252525; border: 1px solid #3a3a3a; border-radius: 8px;
            padding: 0 8px; transition: border-color 0.2s;
        }
        .nav-search:focus-within { border-color: #007bff; }
        .nav-search input {
            flex: 1; min-width: 0; background: transparent; border: none; outline: none;
            color: #fff; font-size: 16px; /* no iOS zoom */ padding: 8px 2px;
        }
        .nav-search input::placeholder { color: #555; }
        .nav-search-btn {
            background: none; border: none; color: #007bff; font-size: 13px; font-weight: bold;
            cursor: pointer; padding: 4px 5px; border-radius: 4px; white-space: nowrap;
            min-height: 36px; -webkit-tap-highlight-color: transparent;
        }
        .nav-search-btn:active { background: rgba(0,123,255,0.15); }
        .nav-search-sep { color: #3a3a3a; flex-shrink: 0; }
        .search-clear-btn {
            background: none; border: none; color: #555; font-size: 14px; font-weight: bold;
            cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1;
            display: none; align-items: center; justify-content: center;
            min-height: 24px; min-width: 24px; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent; transition: color 0.15s;
        }
        .search-clear-btn:hover { color: #bbb; }

        /* ── Value field wrapper (for $ prefix) ── */
        .value-wrapper {
            position: relative; flex-shrink: 0; width: 76px;
            display: inline-flex; align-items: center;
        }
        .value-prefix {
            position: absolute; left: 9px; color: #aaa; font-size: 16px;
            pointer-events: none; user-select: none;
        }
        /* ── Price fetch button ── */
        .price-btn {
            background: #1a3a1a; border: 1px solid #2a5a2a; color: #66bb6a;
            padding: 8px 9px; border-radius: 6px; font-size: 13px; cursor: pointer;
            font-weight: bold; white-space: nowrap; min-height: 40px; min-width: 36px;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            -webkit-tap-highlight-color: transparent; flex-shrink: 0;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .price-btn:active  { background: #2a5a2a; }
        .price-btn.loading { color: #555; border-color: #333; background: #1e1e1e; cursor: wait; }
        .price-btn.error   { color: #e57373; border-color: #5a2a2a; background: #3a1a1a; }

        .nav-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 7px 11px; border-radius: 7px; border: none;
            font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap;
            min-height: 36px; -webkit-tap-highlight-color: transparent;
            transition: filter 0.15s;
        }
        .nav-btn:active { filter: brightness(0.85); }
        .btn-save    { background: #000; color: #aaa; }
        .btn-load    { background: #000; color: #aaa; }
        .btn-gallery { background: #000; color: #aaa; }
        .btn-print   { background: #000; color: #aaa; }

        #total-value-display {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 11px; background: #252525; border: 1px solid #3a3a3a;
            border-radius: 7px; font-size: 13px; white-space: nowrap; color: #ccc;
        }
        #total-value-display strong { color: #fff; }

        .settings-toggle-btn {
            background: none; border: 1px solid #333; border-radius: 6px;
            color: #666; padding: 6px 9px; cursor: pointer; font-size: 18px; line-height: 1;
            min-height: 36px; min-width: 36px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .settings-toggle-btn:active { color: #fff; border-color: #555; }

        /* Settings drawer */
        .nav-settings-bar {
            display: none; flex-wrap: wrap; align-items: center; gap: 8px;
            padding: 8px 12px 10px; border-top: 1px solid #252525;
        }
        .nav-settings-bar.open { display: flex; }
        #mobile-actions { display: none; gap: 6px; flex-wrap: wrap; width: 100%; margin-bottom: 4px; }
        .nav-settings-bar input[type="number"] {
            width: 60px; padding: 7px 8px; border-radius: 6px;
            border: 1px solid #3a3a3a; background: #252525; color: #fff;
            font-size: 16px; min-height: 38px;
            -moz-appearance: textfield;
        }
        .nav-settings-bar input[type="number"]::-webkit-outer-spin-button,
        .nav-settings-bar input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .settings-label { font-size: 0.68em; color: #666; text-transform: uppercase; font-weight: bold; letter-spacing: 0.07em; }
        .settings-apply {
            padding: 7px 14px; background: #007bff; color: #fff; border: none;
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 38px;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-page-group { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .nav-page-group input {
            width: 56px; padding: 7px 8px; border-radius: 6px;
            border: 1px solid #3a3a3a; background: #252525; color: #fff;
            font-size: 16px; min-height: 38px;
            -moz-appearance: textfield;
        }
        .nav-page-group input::-webkit-outer-spin-button,
        .nav-page-group input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .nav-page-group button {
            padding: 7px 13px; background: #2a2a2a; color: #ccc;
            border: 1px solid #3a3a3a; border-radius: 6px;
            font-size: 14px; font-weight: bold; cursor: pointer; min-height: 38px;
        }
        .nav-page-group button:active { background: #3a3a3a; color: #fff; }

        /* ── Header MEDIUM: ≤1059px — hide sub-brand & divider, keep single row ── */
        @media (max-width: 1059px) {
            .nav-brand .brand-sub { display: none; }
            .nav-divider           { display: none; }
        }

        /* ── Header MOBILE: ≤600px — wrap search to its own row, desktop btns to drawer ── */
        @media (max-width: 600px) {
            .hide-mobile    { display: none !important; }
            #mobile-actions { display: flex; }
            .nav-main       { flex-wrap: wrap; padding-bottom: 6px; gap: 8px; }
            .nav-brand      { flex: 1; min-width: 0; }
            .nav-search     { order: 10; flex: 0 0 100%; } /* push to its own full-width row */
        }

        /* ── Collection list ── */
        #collection-list { padding: 8px 8px 120px; }

        /* ── Collapsible page sections ── */
        .page-section { margin-bottom: 6px; }
        .page-header {
            display: flex; align-items: center; gap: 10px;
            margin: 16px 0 0; padding: 9px 12px;
            background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 8px;
            cursor: pointer; user-select: none; min-height: 44px;
            transition: background 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .page-header:active { background: #222; border-color: #3a3a3a; }
        .page-header.open   { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: transparent; }
        .page-caret { font-size: 0.65em; color: #555; transition: transform 0.2s; flex-shrink: 0; }
        .page-header.open .page-caret { transform: rotate(90deg); }
        .page-header-label { font-size: 0.78em; font-weight: 700; color: #777; text-transform: uppercase; letter-spacing: 0.09em; white-space: nowrap; }
        .page-header-line  { flex: 1; height: 1px; background: linear-gradient(to right, #2e2e2e, transparent); }
        .page-header-stats { font-size: 0.7em; color: #555; white-space: nowrap; display: flex; gap: 8px; }
        .page-header-stats .stat-collected { color: #43a047; }
        .page-header-stats .stat-wanted    { color: #e57373; }
        .page-body {
            overflow: hidden; max-height: 0; transition: max-height 0.3s ease;
            border: 1px solid #2e2e2e; border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .page-body.open { max-height: 9999999px; padding-bottom: 4px; }

        /* ── Item rows ── */
        .item-row {
            display: flex; flex-wrap: wrap; align-items: center;
            background-color: #1e1e1e; margin: 6px 4px; padding: 10px;
            border-radius: 8px; border-left: 4px solid #555; gap: 8px;
            transition: background-color 0.3s, border-left-color 0.3s;
        }
        .item-row.highlight { border-left-color: #ffaa00; background-color: #332b1a; }
        .item-number  { font-size: 1em; font-weight: bold; width: 38px; flex-shrink: 0; color: #aaa; }
        .item-location { font-size: 0.7em; color: #666; width: 80px; flex-shrink: 0; line-height: 1.4; }

        .input-group { display: flex; flex: 1; flex-wrap: nowrap; gap: 6px; align-items: center; min-width: 0; }
        .input-fields { display: flex; flex: 1; flex-wrap: nowrap; gap: 6px; align-items: center; min-width: 0; }
        .input-actions { display: flex; flex-wrap: nowrap; gap: 6px; align-items: center; flex-shrink: 0; flex-direction: row; }
        .action-row-1 { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; flex-shrink: 0; }
        .action-row-2 { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; flex-shrink: 0; }

        /* ── MEDIUM: 768–1059px — inputs fill top row, actions below in one horizontal row ── */
        @media (max-width: 1059px) {
            .input-group    { flex-wrap: wrap; }
            .input-fields   { flex: 0 0 100%; min-width: 0; }
            .input-actions  { flex: 0 0 100%; flex-direction: row; flex-wrap: wrap; gap: 8px; align-items: center; }
            .action-row-1   { flex-wrap: nowrap; flex: 0 0 auto; }
            .action-row-2   { flex-wrap: nowrap; flex: 0 0 auto; }
        }

        /* ── MOBILE: ≤767px — hide location, stack action-rows vertically, short labels ── */
        @media (max-width: 767px) {
            .item-location  { display: none; }
            .item-number    { width: 30px; font-size: 0.9em; }
            .item-name, .item-set, .item-set-number { min-width: 0; }
            .set-autocomplete-wrapper { min-width: 0; }
            /* Stack action rows vertically */
            .input-actions  { flex-direction: column; align-items: flex-start; gap: 6px; }
            .action-row-1   { width: 100%; flex-wrap: nowrap; justify-content: flex-start; }
            .action-row-2   { flex-wrap: nowrap; gap: 10px; }
            /* Full checkbox labels restored — room freed by removing W/C toggle pills */
            .checkbox-label       { font-size: 0.82em; gap: 6px; min-height: 28px; }
            .checkbox-label input { width: 17px; height: 17px; }
            .toggle-label         { display: none; }
            .status-toggle        { gap: 0; } /* no gap needed without external labels */
            /* Slightly wider track on mobile so letter + circle both fit */
            .toggle-track         { width: 52px; }
        }

        .item-name, .item-set {
            flex: 0.38; min-width: 40px; padding: 9px 10px;
            border: 1px solid #444; border-radius: 6px;
            background: #2a2a2a; color: white; font-size: 16px; min-height: 40px;
        }
        .item-set-number {
            flex: 0.22; min-width: 30px; padding: 9px 8px;
            border: 1px solid #444; border-radius: 6px;
            background: #2a2a2a; color: white; font-size: 16px; min-height: 40px;
        }
        .item-value {
            width: 76px; flex-shrink: 0; padding: 9px 8px 9px 20px;
            border: 1px solid #444; border-radius: 6px;
            background: #2a2a2a; color: white; font-size: 16px; min-height: 40px;
        }
        /* Remove spinner arrows from value field */
        .item-value::-webkit-outer-spin-button,
        .item-value::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .item-value { -moz-appearance: textfield; }
        .tcg-btn {
            background: #1a73e8; border: 1px solid #1558b0; color: #fff;
            padding: 8px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
            font-weight: bold; white-space: nowrap; min-height: 40px; min-width: 44px;
            transition: background 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .tcg-btn:active { background: #1558b0; }
        .photo-btn {
            background: #2a2a2a; border: 1px solid #444; color: #aaa;
            padding: 8px 10px; border-radius: 6px; font-size: 16px; cursor: pointer;
            min-height: 40px; min-width: 44px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: color 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-btn.has-photo { color: #28a745; border-color: #28a745; }

        /* ── Set autocomplete dropdown ── */
        .set-autocomplete-wrapper { position: relative; flex: 0.38; min-width: 40px; }
        .set-autocomplete-wrapper .item-set { width: 100%; flex: unset; }
        .set-dropdown {
            position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 50;
            background: #1e1e1e; border: 1px solid #007bff; border-radius: 6px;
            max-height: 180px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            display: none;
        }
        .set-dropdown.open { display: block; }
        .set-dropdown-item {
            padding: 8px 12px; font-size: 14px; color: #ccc; cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .set-dropdown-item:last-child { border-bottom: none; }
        .set-dropdown-item:hover, .set-dropdown-item.active { background: #1a2a3a; color: #fff; }
        .set-dropdown-item .set-count { float: right; color: #555; font-size: 12px; margin-left: 8px; }

        /* Checkbox row — now split into action-row-1 (toggle) and action-row-2 (checkboxes) */
        .checkbox-container { display: flex; flex-wrap: nowrap; gap: 10px; align-items: center; flex-shrink: 0; }
        .checkbox-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-size: 0.85em; min-height: 32px; -webkit-tap-highlight-color: transparent;
        }
        .checkbox-label input { width: 20px; height: 20px; accent-color: #007bff; cursor: pointer; }
        .cb-short { display: none; }

        /* ── Wanted / Collected toggle ── */
        .status-toggle { display: flex; align-items: center; gap: 8px; user-select: none; }
        .toggle-label {
            font-size: 0.75em; font-weight: bold; letter-spacing: 0.04em;
            min-width: 56px; text-align: center; padding: 3px 7px; border-radius: 4px;
            border: 1px solid transparent; transition: color 0.25s, border-color 0.25s, background 0.25s;
        }
        /* Default (wanted active): WANTED outlined, COLLECTED dim */
        .toggle-label.wanted-lbl    { color: #e57373; border-color: #e57373; background: rgba(229,115,115,0.08); }
        .toggle-label.collected-lbl { color: #444; background: transparent; border-color: transparent; }
        /* When collected: flip which label is outlined */
        .is-collected ~ .toggle-label.collected-lbl,
        .status-toggle:has(.is-collected) .toggle-label.collected-lbl { color: #66bb6a; border-color: #66bb6a; background: rgba(102,187,106,0.08); }
        .status-toggle:has(.is-collected) .toggle-label.wanted-lbl    { color: #444; border-color: transparent; background: transparent; }

        /* On mobile, hide the external W / C pills — the letter is shown inside the track */
        @media (max-width: 767px) {
            .toggle-label { display: none; }
        }

        /* ── Theme toggle (Dark / Light) ── */
        .theme-toggle { display: flex; align-items: center; gap: 6px; user-select: none; flex-shrink: 0; }
        .theme-toggle-label {
            font-size: 0.72em; font-weight: bold; letter-spacing: 0.04em;
            padding: 3px 7px; border-radius: 4px; border: 1px solid transparent;
            transition: color 0.25s, border-color 0.25s, background 0.25s; white-space: nowrap;
        }
        .theme-lbl-dark  { color: #90caf9; border-color: #90caf9; background: rgba(144,202,249,0.1); }
        .theme-lbl-light { color: #aaa; border-color: transparent; background: transparent; }
        body.light .theme-lbl-dark  { color: #aaa; border-color: transparent; background: transparent; }
        body.light .theme-lbl-light { color: #f9a825; border-color: #f9a825; background: rgba(249,168,37,0.1); }
        .theme-track {
            position: relative; width: 48px; height: 26px; border-radius: 13px;
            background: #1e3a5f; cursor: pointer; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.08); transition: background 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        body.light .theme-track { background: #f9a825; }
        .theme-track::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 16px; height: 16px; border-radius: 50%; background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4); transition: transform 0.25s;
        }
        body.light .theme-track::after { transform: translateX(22px); }
        .toggle-track {
            position: relative; width: 48px; height: 26px; border-radius: 13px;
            background: #e53935; cursor: pointer; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.08); transition: background 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        .toggle-track.is-collected { background: #43a047; }
        /* Letter on the highlighted side, opposite the circle */
        .toggle-track::before {
            content: 'W';
            position: absolute; right: 7px; top: 50%;
            transform: translateY(-50%);
            font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.9);
            pointer-events: none; line-height: 1; transition: none;
        }
        .toggle-track.is-collected::before {
            content: 'C';
            right: auto; left: 7px;
        }
        .toggle-track::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 16px; height: 16px; border-radius: 50%; background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4); transition: transform 0.25s;
        }
        .toggle-track.is-collected::after { transform: translateX(22px); }
    </style>
</head>
<body>

    <script>
        'use strict';

        const TCG_URL        = 'https://www.tcgplayer.com/search/all/product?q=';
        const DEFAULT_BANNER = 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80';
        const DB_NAME        = 'CardCollectionDB';
        const PHOTO_STORE    = 'photos';

        /* ── Theme ── */
        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
        }
        function toggleTheme() {
            const isLight = document.body.classList.contains('light');
            const next = isLight ? 'dark' : 'light';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }
        // Apply saved theme immediately (before render)
        applyTheme(localStorage.getItem('theme') || 'dark');

        /* ── TCG Button visibility ── */
        function applyTCGVisibility(show) {
            document.body.classList.toggle('hide-tcg', !show);
            const cb = document.getElementById('tcg-btn-toggle');
            if (cb) cb.checked = show;
        }
        function toggleTCGButtons(show) {
            localStorage.setItem('showTCGButtons', show ? 'true' : 'false');
            applyTCGVisibility(show);
        }
        // Apply saved preference immediately (default: shown)
        applyTCGVisibility(localStorage.getItem('showTCGButtons') !== 'false');

        let config = JSON.parse(localStorage.getItem('appConfig')) || {
            total: 1025, rows: 4, cols: 4, bannerUrl: DEFAULT_BANNER
        };

        document.getElementById('totalItems').value = config.total;
        document.getElementById('gridRows').value   = config.rows;
        document.getElementById('gridCols').value   = config.cols;
        applyBanner(config.bannerUrl);

        /* ── IndexedDB (cached connection) ── */
        let _db = null;
        function openDB() {
            if (_db) return Promise.resolve(_db);
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore(PHOTO_STORE);
                req.onsuccess  = (e) => { _db = e.target.result; resolve(_db); };
                req.onerror    = (e) => reject(e.target.error);
            });
        }
        function savePhoto(id, dataUrl) {
            return openDB().then(db => new Promise((res, rej) => {
                const tx = db.transaction(PHOTO_STORE, 'readwrite');
                tx.objectStore(PHOTO_STORE).put(dataUrl, id);
                tx.oncomplete = res;
                tx.onerror    = (e) => rej(e.target.error);
            }));
        }
        function getAllPhotos() {
            return openDB().then(db => new Promise((res, rej) => {
                const results = {};
                const req = db.transaction(PHOTO_STORE, 'readonly').objectStore(PHOTO_STORE).openCursor();
                req.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) { results[cursor.key] = cursor.value; cursor.continue(); }
                    else res(results);
                };
                req.onerror = (e) => rej(e.target.error);
            }));
        }
        function deletePhotoFromDB(id) {
            return openDB().then(db => new Promise((res, rej) => {
                const tx = db.transaction(PHOTO_STORE, 'readwrite');
                tx.objectStore(PHOTO_STORE).delete(id);
                tx.oncomplete = res;
                tx.onerror    = (e) => rej(e.target.error);
            }));
        }

        /* ── Photo capture ── */
        let captureTargetId = null;
        function openCamera(id) {
            captureTargetId = id;
            document.getElementById('camera-input').click();
        }
        async function handlePhotoCapture(event) {
            const file = event.target.files[0];
            if (!file || captureTargetId === null) return;
            try {
                const dataUrl = await compressImage(file, 900, 0.78);
                await savePhoto(captureTargetId, dataUrl);
                setPhotoBtn(captureTargetId, true);
            } catch (err) { console.error('Photo save failed:', err); }
            event.target.value = '';
        }
        function compressImage(file, maxPx, quality) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    let w = img.width, h = img.height;
                    if (w > maxPx || h > maxPx) {
                        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
                        else        { w = Math.round(w * maxPx / h); h = maxPx; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
                img.src = url;
            });
        }
        function setPhotoBtn(id, hasPhoto) {
            const btn    = document.getElementById(`photo-btn-${id}`);
            const delBtn = document.getElementById(`del-photo-btn-${id}`);
            if (!btn) return;
            btn.textContent = hasPhoto ? '📸' : '📷';
            btn.title       = hasPhoto ? 'Tap to replace photo' : 'Take / add photo';
            btn.classList.toggle('has-photo', hasPhoto);
            if (delBtn) delBtn.style.display = hasPhoto ? '' : 'none';
        }
        async function initPhotoButtons() {
            try {
                const photos = await getAllPhotos();
                for (const id of Object.keys(photos)) setPhotoBtn(parseInt(id), true);
            } catch (e) { /* silently skip if IndexedDB unavailable */ }
        }

        /* ── Gallery ── */
        async function openGallery() {
            let photos;
            try { photos = await getAllPhotos(); }
            catch(e) { alert('Unable to access photo storage.'); return; }
            const entries = Object.keys(photos);
            if (!entries.length) { alert('No card photos yet — tap 📷 on any entry to add one.'); return; }

            const cards = entries.map(id => {
                const saved = JSON.parse(localStorage.getItem(`item-${id}`)) || {};
                return { id, name: saved.name || '', variant: saved.variant || '', photo: photos[id] };
            }).sort((a, b) => parseInt(a.id) - parseInt(b.id));

            const cardHTML = cards.map(c => `
                <div class="card" data-src="${c.photo}" data-label="#${c.id} ${c.name || ''}">
                    <img src="${c.photo}" alt="Card #${c.id}" loading="lazy">
                    <div class="card-info">
                        <span class="card-num">#${c.id}</span>
                        <span class="card-name">${c.name || '(unnamed)'}</span>
                        ${c.variant ? `<span class="card-variant">${c.variant}</span>` : ''}
                    </div>
                </div>`).join('');

            const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .top-bar h1 { font-size:1.2em; margin:0; }

  .card-name { font-size:0.88em; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-variant { font-size:0.75em; color:#aaa; }
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:999; justify-content:center; align-items:center; flex-direction:column; gap:12px; padding:20px; }

<body>
<div class="top-bar">
  <h1>📸 Card Photos</h1>
  <span class="count">${cards.length} photo${cards.length !== 1 ? 's' : ''}</span>
  <button class="back-btn" onclick="window.close()">✕ Close</button>
</div>
<div class="grid">${cardHTML}</div>
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>

<script>
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      document.getElementById('lightbox-img').src = card.dataset.src;
      document.getElementById('lightbox-label').textContent = card.dataset.label;
      document.getElementById('lightbox').classList.add('open');
    });

  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });

            const blob = new Blob([html], { type: 'text/html' });
            const url  = URL.createObjectURL(blob);
            const win  = window.open(url, '_blank');
            if (!win) alert('Please allow popups to view the gallery.');
            setTimeout(() => URL.revokeObjectURL(url), 15000);
        }

        /* ── Settings ── */
        function toggleSettings() {
            const bar  = document.getElementById('nav-settings-bar');
            const btn  = document.getElementById('settings-toggle-btn');
            const open = bar.classList.toggle('open');
            btn.textContent = open ? '✕' : '⚙';
            btn.title       = open ? 'Close settings' : 'Settings';
        }
        function applySettings() {
            config.total = Math.max(1, parseInt(document.getElementById('totalItems').value) || 1);
            config.rows  = Math.max(1, parseInt(document.getElementById('gridRows').value)   || 1);
            config.cols  = Math.max(1, parseInt(document.getElementById('gridCols').value)   || 1);
            localStorage.setItem('appConfig', JSON.stringify(config));
            renderList();
        }

        /* ── Banner ── */
        function applyBanner(url) {
            const img = document.getElementById('banner-img');
            img.src = url || DEFAULT_BANNER;
            img.onerror = () => { img.src = DEFAULT_BANNER; };
        }
        let bannerMode = null;
        function openBannerModal() {
            bannerMode = null;
            document.getElementById('choice-local').classList.remove('selected');
            document.getElementById('choice-link').classList.remove('selected');
            document.getElementById('bm-input-area').innerHTML = '';
            document.getElementById('banner-modal-overlay').classList.add('open');
        }
        function closeBannerModal() {
            document.getElementById('banner-modal-overlay').classList.remove('open');
        }
        function selectBannerMode(mode) {
            bannerMode = mode;
            document.getElementById('choice-local').classList.toggle('selected', mode === 'local');
            document.getElementById('choice-link').classList.toggle('selected', mode === 'link');
            const area = document.getElementById('bm-input-area');
            area.innerHTML = mode === 'local'
                ? `<input type="file" id="bm-file-input" accept="image/*">`
                : `<input type="text" id="bm-url-input" placeholder="Paste image URL here…">`;
        }
        function applyBannerFromModal() {
            if (!bannerMode) { alert('Please choose Local File or Image Link first.'); return; }
            if (bannerMode === 'link') {
                const url = (document.getElementById('bm-url-input').value || '').trim();
                if (!url) { alert('Please enter a URL.'); return; }
                config.bannerUrl = url;
                localStorage.setItem('appConfig', JSON.stringify(config));
                applyBanner(url); closeBannerModal();
            } else {
                const fi = document.getElementById('bm-file-input');
                if (!fi.files || !fi.files[0]) { alert('Please select a file.'); return; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    config.bannerUrl = e.target.result;
                    localStorage.setItem('appConfig', JSON.stringify(config));
                    applyBanner(e.target.result); closeBannerModal();
                };
                reader.readAsDataURL(fi.files[0]);
            }

        /* ── Rarity colors ── */
        const RARITY = [
            { min: 300, color: '#e53935' },
            { min: 100, color: '#ff8f00' },
            { min: 30,  color: '#9c27b0' },
            { min: 10,  color: '#1e88e5' },
            { min: 1,   color: '#43a047' },
            { min: 0,   color: '#555555' },
        ];
        function getRarityColor(value) {
            const v = parseFloat(value) || 0;
            for (const r of RARITY) { if (v >= r.min) return r.color; }
            return '#555555';
        }
        function applyRarityBorder(id, value) {
            const row = document.getElementById(`row-${id}`);
            if (row) row.style.borderLeftColor = getRarityColor(value);
        }

        /* ── Data ── */
        function toggleCollected(id) {
            const track = document.getElementById(`toggle-${id}`);
            if (!track) return;
            track.classList.toggle('is-collected');
            saveData(id);
        }
        function saveData(id) {
            const nameEl      = document.getElementById(`name-${id}`);
            const setEl       = document.getElementById(`set-${id}`);
            const setNumberEl = document.getElementById(`setNumber-${id}`);
            const valueEl     = document.getElementById(`value-${id}`);
            const track       = document.getElementById(`toggle-${id}`);
            const faEl        = document.getElementById(`cbFA-${id}`);
            const holoEl      = document.getElementById(`cbHolo-${id}`);
            const revHoloEl   = document.getElementById(`cbRevHolo-${id}`);
            if (!nameEl) return;
            const collected = track ? track.classList.contains('is-collected') : false;
            const item = {
                name:      nameEl.value,
                set:       setEl       ? setEl.value       : '',
                setNumber: setNumberEl ? setNumberEl.value : '',
                value:     parseFloat(valueEl ? valueEl.value : 0) || 0,
                collected,
                fullArt:   faEl      ? faEl.checked      : false,
                holo:      holoEl    ? holoEl.checked    : false,
                revHolo:   revHoloEl ? revHoloEl.checked : false,
                wanted:    !collected,
            };
            localStorage.setItem(`item-${id}`, JSON.stringify(item));
            applyRarityBorder(id, item.value);
            updateTotalValue();
            touchLastUpdated();
            updatePageStats(id);
        }
        function updatePageStats(id) {
            const pageSize = config.rows * config.cols;
            const page     = Math.floor((id - 1) / pageSize) + 1;
            const start    = (page - 1) * pageSize + 1;
            const end      = Math.min(page * pageSize, config.total);
            let collected = 0, wanted = 0, total = 0;
            for (let i = start; i <= end; i++) {
                const s = JSON.parse(localStorage.getItem(`item-${i}`)) || {};
                total++;
                if (s.collected) collected++; else wanted++;
            }
            const statsEl = document.querySelector(`#page-header-${page} .page-header-stats`);
            if (statsEl) statsEl.innerHTML = `
                <span class="stat-collected">✓ ${collected}</span>
                <span class="stat-wanted">♥ ${wanted}</span>
                <span>${total} cards</span>`;
        }
        function updateTotalValue() {
            let total = 0;
            for (let i = 1; i <= config.total; i++) {
                const el = document.getElementById(`value-${i}`);
                if (el) total += parseFloat(el.value) || 0;
            }
            document.getElementById('total-value-amt').textContent = '$' + total.toFixed(2);
        }

        /* ── Wanted / PDF ── */
        function printWanted() {
            const wanted = [];
            for (let i = 1; i <= config.total; i++) {
                const saved = JSON.parse(localStorage.getItem(`item-${i}`));
                if (saved && !saved.collected) wanted.push({ id: i, ...saved });
            }
            if (!wanted.length) { alert('No entries marked as Wanted.'); return; }

            // Dynamically load jsPDF + autoTable then generate
            function doGenerate() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const pageW = doc.internal.pageSize.getWidth();
                const pageSize = config.rows * config.cols;
                const dateStr = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

                // ── Header bar ──
                doc.setFillColor(20, 20, 20);
                doc.rect(0, 0, pageW, 22, 'F');
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(16);
                doc.setTextColor(255, 255, 255);
                doc.text('PokeDexCheck', 14, 13);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(160, 160, 160);
                doc.text('Wanted List', 14, 19);

                // Date top-right
                doc.setFontSize(8);
                doc.setTextColor(150, 150, 150);
                doc.text(dateStr, pageW - 14, 13, { align: 'right' });
                doc.text(`${wanted.length} item${wanted.length !== 1 ? 's' : ''}`, pageW - 14, 19, { align: 'right' });

                // ── Summary stats ──
                const totalValue = wanted.reduce((s, c) => s + (parseFloat(c.value) || 0), 0);
                const fullArtCount = wanted.filter(c => c.fullArt).length;

                doc.setFillColor(245, 245, 245);
                doc.rect(0, 22, pageW, 14, 'F');
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8);
                doc.setTextColor(80, 80, 80);
                doc.text(`TOTAL ITEMS: ${wanted.length}`, 14, 30);
                doc.text(`FULL ART: ${fullArtCount}`, 70, 30);
                doc.text(`EST. VALUE: $${totalValue.toFixed(2)}`, 110, 30);

                // ── Table ──
                const tableRows = wanted.map(c => {
                    const pg     = Math.floor((c.id - 1) / pageSize) + 1;
                    const pos    = (c.id - 1) % pageSize;
                    const rowNum = Math.floor(pos / config.cols) + 1;
                    const colNum = (pos % config.cols) + 1;
                    return [
                        String(c.id),
                        c.name || '—',
                        c.set || '—',
                        c.setNumber || '—',
                        c.value ? `$${parseFloat(c.value).toFixed(2)}` : '—',
                        `Pg ${pg}  R${rowNum} S${colNum}`,
                        c.fullArt ? '✓' : ''
                    ];
                });

                doc.autoTable({
                    startY: 38,
                    head: [['#', 'Name', 'Set', 'Set #', 'Value', 'Location', 'FA']],
                    body: tableRows,
                    styles: {
                        font: 'helvetica', fontSize: 9, cellPadding: 3,
                        textColor: [30, 30, 30], lineColor: [220, 220, 220], lineWidth: 0.2
                    },
                    headStyles: {
                        fillColor: [30, 30, 30], textColor: [255, 255, 255],
                        fontStyle: 'bold', fontSize: 8, halign: 'left'
                    },
                    alternateRowStyles: { fillColor: [250, 250, 250] },
                    columnStyles: {
                        0: { cellWidth: 12, halign: 'center' },
                        4: { cellWidth: 22, halign: 'right' },
                        5: { cellWidth: 30 },
                        6: { cellWidth: 10, halign: 'center' }
                    },
                    margin: { left: 14, right: 14 },
                    didDrawPage: (data) => {
                        // Footer on each page
                        const pCount = doc.internal.getNumberOfPages();
                        const pNum   = data.pageNumber;
                        doc.setFontSize(7);
                        doc.setTextColor(180, 180, 180);
                        doc.text(`PokeDexCheck — Wanted List`, 14, doc.internal.pageSize.getHeight() - 6);
                        doc.text(`Page ${pNum} of ${pCount}`, pageW - 14, doc.internal.pageSize.getHeight() - 6, { align: 'right' });
                    }
                });

                doc.save(`PokeDexCheck_Wanted_${new Date().toISOString().slice(0,10)}.pdf`);
            }

            // Load libs if not already present
            if (window.jspdf && window.jspdf.jsPDF) {
                doGenerate();
            } else {
                const s1 = document.createElement('script');
                s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                s1.onload = () => {
                    const s2 = document.createElement('script');
                    s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
                    s2.onload = doGenerate;
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s1);
            }
        }

        /* ── JSON Save / Import ── */
        function saveJSON() {
            const blank = { name:'', set:'', setNumber:'', value:0, collected:false, fullArt:false, holo:false, revHolo:false, wanted:true };
            const data  = { config, items: {} };
            for (let i = 1; i <= config.total; i++) {
                data.items[i] = JSON.parse(localStorage.getItem(`item-${i}`)) || { ...blank };
            }
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a    = document.createElement('a');
            a.href     = URL.createObjectURL(blob);
            a.download = 'pokédexcheck.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            touchLastUpdated();
        }
        function loadJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.items) throw new Error('Invalid format — missing items key');
                    if (data.config) {
                        config = { ...config, ...data.config };
                        document.getElementById('totalItems').value = config.total;
                        document.getElementById('gridRows').value   = config.rows;
                        document.getElementById('gridCols').value   = config.cols;
                        localStorage.setItem('appConfig', JSON.stringify(config));
                        applyBanner(config.bannerUrl);
                    }
                    for (const [id, item] of Object.entries(data.items)) {
                        localStorage.setItem(`item-${id}`, JSON.stringify(item));
                    }
                    renderList();
                    touchLastUpdated();
                    alert(`Imported ${Object.keys(data.items).length} items successfully.`);
                } catch (err) { alert('Failed to import: ' + err.message); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        /* ── Collapsible pages ── */
        function togglePage(page) {
            const header = document.getElementById(`page-header-${page}`);
            const body   = document.getElementById(`page-body-${page}`);
            if (!header || !body) return;
            const open = header.classList.toggle('open');
            body.classList.toggle('open', open);
            header.setAttribute('aria-expanded', open ? 'true' : 'false');
            const collapsed = JSON.parse(localStorage.getItem('collapsedPages') || '{}');
            collapsed[page] = !open;
            localStorage.setItem('collapsedPages', JSON.stringify(collapsed));
        }

        function collapseAll() {
            const pageSize   = config.rows * config.cols;
            const totalPages = Math.ceil(config.total / pageSize);
            const collapsed  = {};
            for (let p = 1; p <= totalPages; p++) {
                const header = document.getElementById(`page-header-${p}`);
                const body   = document.getElementById(`page-body-${p}`);
                if (!header || !body) continue;
                header.classList.remove('open');
                body.classList.remove('open');
                header.setAttribute('aria-expanded', 'false');
                collapsed[p] = true;
            }
            localStorage.setItem('collapsedPages', JSON.stringify(collapsed));
        }

        function expandAll() {
            const pageSize   = config.rows * config.cols;
            const totalPages = Math.ceil(config.total / pageSize);
            const collapsed  = {};
            for (let p = 1; p <= totalPages; p++) {
                const header = document.getElementById(`page-header-${p}`);
                const body   = document.getElementById(`page-body-${p}`);
                if (!header || !body) continue;
                header.classList.add('open');
                body.classList.add('open');
                header.setAttribute('aria-expanded', 'true');
                collapsed[p] = false;
            }
            localStorage.setItem('collapsedPages', JSON.stringify(collapsed));
        }

        /* ── Set Autocomplete ── */
        const _setAC = {}; // per-row state: { activeIdx }

        function onSetInput(id) {
            saveData(id);
            const val = (document.getElementById(`set-${id}`)?.value || '').trim().toLowerCase();
            const dd  = document.getElementById(`set-dd-${id}`);
            if (!dd) return;
            if (!val) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
            const matches = POKEMON_SETS.filter(s => s.name.toLowerCase().includes(val)).slice(0, 10);
            if (!matches.length) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
            _setAC[id] = { activeIdx: -1, matches };
            dd.innerHTML = matches.map((s, idx) =>
                `<div class="set-dropdown-item" data-idx="${idx}" onmousedown="selectSet(${id},${idx})">${s.name}<span class="set-count">/${s.total}</span></div>`
            ).join('');
            dd.classList.add('open');
        }

        function onSetKeydown(e, id) {
            const dd = document.getElementById(`set-dd-${id}`);
            if (!dd || !dd.classList.contains('open')) return;
            const state = _setAC[id];
            if (!state) return;
            const items = dd.querySelectorAll('.set-dropdown-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                state.activeIdx = Math.min(state.activeIdx + 1, items.length - 1);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                state.activeIdx = Math.max(state.activeIdx - 1, 0);
            } else if (e.key === 'Enter' && state.activeIdx >= 0) {
                e.preventDefault();
                selectSet(id, state.activeIdx);
                return;
            } else if (e.key === 'Escape') {
                closeSetDropdown(id); return;
            } else { return; }
            items.forEach((el, i) => el.classList.toggle('active', i === state.activeIdx));
        }

        function selectSet(id, idx) {
            const state = _setAC[id];
            if (!state) return;
            const set = state.matches[idx];
            if (!set) return;
            const input = document.getElementById(`set-${id}`);
            if (input) input.value = set.name;
            // Auto-fill set number total if field is empty or only has a number prefix
            const snInput = document.getElementById(`setNumber-${id}`);
            if (snInput) {
                const cur = snInput.value.trim();
                const total = String(set.total).padStart(3, '0');
                if (!cur) {
                    snInput.value = `/${total}`;
                } else if (/^\d+$/.test(cur)) {
                    // user typed just "013" — append the total
                    snInput.value = `${cur.padStart(3,'0')}/${total}`;
                } else if (/^\//.test(cur) || cur === '') {
                    snInput.value = `/${total}`;
                }
                // Otherwise leave what they typed
            }
            closeSetDropdown(id);
            saveData(id);
        }

        function closeSetDropdown(id) {
            const dd = document.getElementById(`set-dd-${id}`);
            if (dd) { dd.classList.remove('open'); }
        }

        /* ── Price Fetch (Pokemon TCG API) ── */
        async function fetchPrice(id) {
            const btn       = document.getElementById(`price-btn-${id}`);
            const nameEl    = document.getElementById(`name-${id}`);
            const snEl      = document.getElementById(`setNumber-${id}`);
            const valueEl   = document.getElementById(`value-${id}`);
            const holoEl    = document.getElementById(`cbHolo-${id}`);
            const revHoloEl = document.getElementById(`cbRevHolo-${id}`);
            const faEl      = document.getElementById(`cbFA-${id}`);

            const cardName = (nameEl?.value || '').trim();
            const snRaw    = (snEl?.value   || '').trim();
            if (!cardName) { btn.classList.add('error'); btn.textContent = '?'; setTimeout(() => resetPriceBtn(id), 2000); return; }

            // Extract card number from "013/217" or "013" or "13"
            const cardNum = snRaw.split('/')[0].replace(/^0+/, '') || '';

            btn.classList.remove('error');
            btn.classList.add('loading');
            btn.textContent = '…';

            try {
                // Build query: name + number if available
                let q = `name:"${cardName.replace(/"/g, '')}"`;
                if (cardNum) q += ` number:${cardNum}`;

                const url  = `https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(q)}&pageSize=10&select=name,number,tcgplayer,set`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const json = await resp.json();
                const cards = json.data || [];

                if (!cards.length) throw new Error('not found');

                // If multiple results, prefer the one whose set name matches
                const setVal = (document.getElementById(`set-${id}`)?.value || '').trim().toLowerCase();
                let card = cards[0];
                if (setVal && cards.length > 1) {
                    const match = cards.find(c => c.set?.name?.toLowerCase().includes(setVal) || setVal.includes(c.set?.name?.toLowerCase()));
                    if (match) card = match;
                }

                const prices = card?.tcgplayer?.prices;
                if (!prices) throw new Error('no price');

                // Pick the right variant based on checkboxes
                let market = null;
                const isFA      = faEl?.checked;
                const isHolo    = holoEl?.checked;
                const isRevHolo = revHoloEl?.checked;

                if (isFA && prices['1stEditionHolofoil'])        market = prices['1stEditionHolofoil'].market;
                else if (isFA && prices.holofoil)                market = prices.holofoil.market;
                else if (isRevHolo && prices.reverseHolofoil)    market = prices.reverseHolofoil.market;
                else if (isHolo && prices.holofoil)              market = prices.holofoil.market;
                else if (prices.normal)                          market = prices.normal.market;
                else if (prices.holofoil)                        market = prices.holofoil.market;
                else if (prices.reverseHolofoil)                 market = prices.reverseHolofoil.market;

                // Fallback: first available market price
                if (market == null) {
                    for (const v of Object.values(prices)) {
                        if (v?.market != null) { market = v.market; break; }
                    }
                }

                if (market == null) throw new Error('no price data');

                valueEl.value = parseFloat(market).toFixed(2);
                saveData(id);
                btn.classList.remove('loading');
                btn.textContent = '✓';
                btn.style.color = '#66bb6a';
                setTimeout(() => resetPriceBtn(id), 2000);

            } catch (err) {
                btn.classList.remove('loading');
                btn.classList.add('error');
                btn.textContent = '✕';
                setTimeout(() => resetPriceBtn(id), 2500);
            }
        }

        function resetPriceBtn(id) {
            const btn = document.getElementById(`price-btn-${id}`);
            if (!btn) return;
            btn.classList.remove('loading', 'error');
            btn.style.color = '';
            btn.textContent = '💲';
        }

        /* ── Render ── */
        function renderList() {
            const container  = document.getElementById('collection-list');
            container.innerHTML = '';
            const pageSize   = config.rows * config.cols;
            const totalPages = Math.ceil(config.total / pageSize);
            const collapsed  = JSON.parse(localStorage.getItem('collapsedPages') || '{}');
            document.getElementById('gotoPage').max = totalPages;

            // Pre-scan stats
            const pageStats = {};
            for (let i = 1; i <= config.total; i++) {
                const pg    = Math.floor((i - 1) / pageSize) + 1;
                const saved = JSON.parse(localStorage.getItem(`item-${i}`)) || {};
                if (!pageStats[pg]) pageStats[pg] = { total:0, collected:0, wanted:0 };
                pageStats[pg].total++;
                if (saved.collected) pageStats[pg].collected++; else pageStats[pg].wanted++;
            }

            let currentPage = 0, currentBody = null;

            for (let i = 1; i <= config.total; i++) {
                const page      = Math.floor((i - 1) / pageSize) + 1;
                const posInPage = (i - 1) % pageSize;
                const rowNum    = Math.floor(posInPage / config.cols) + 1;
                const colNum    = (posInPage % config.cols) + 1;

                if (page !== currentPage) {
                    currentPage = page;
                    const isOpen = collapsed[page] === false; // default: collapsed
                    const stats  = pageStats[page] || { total:0, collected:0, wanted:0 };

                    const section = document.createElement('div');
                    section.className = 'page-section';

                    const header = document.createElement('div');
                    header.className = 'page-header' + (isOpen ? ' open' : '');
                    header.id        = `page-header-${page}`;
                    header.setAttribute('role', 'button');
                    header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                    header.onclick   = () => togglePage(page);
                    header.innerHTML = `
                        <span class="page-caret" aria-hidden="true">▶</span>
                        <span class="page-header-label">Page ${page}</span>
                        <div class="page-header-line"></div>
                        <div class="page-header-stats">
                            <span class="stat-collected">✓ ${stats.collected}</span>
                            <span class="stat-wanted">♥ ${stats.wanted}</span>
                            <span>${stats.total} cards</span>
                        </div>`;

                    const body = document.createElement('div');
                    body.className = 'page-body' + (isOpen ? ' open' : '');
                    body.id        = `page-body-${page}`;

                    section.appendChild(header);
                    section.appendChild(body);
                    container.appendChild(section);
                    currentBody = body;
                }

                const saved       = JSON.parse(localStorage.getItem(`item-${i}`)) || { name:'', set:'', setNumber:'', value:0, collected:false, fullArt:false, wanted:true };
                const safeName      = (saved.name      || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
                const safeSet       = (saved.set       || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
                const safeSetNumber = (saved.setNumber || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
                const safeValue   = parseFloat(saved.value) || 0;

                const row = document.createElement('div');
                row.className = 'item-row';
                row.id        = `row-${i}`;
                row.style.borderLeftColor = getRarityColor(safeValue);
                row.innerHTML = `
                    <div class="item-number">#${i}</div>
                    <div class="item-location">Page ${page}<br>Row${rowNum}&middot;Slot${colNum}</div>
                    <div class="input-group">
                        <div class="input-fields">
                            <input type="text"   id="name-${i}"       class="item-name"       placeholder="Name"       value="${safeName}"      autocomplete="off" autocorrect="off" spellcheck="false" oninput="saveData(${i})">
                            <div class="set-autocomplete-wrapper">
                                <input type="text" id="set-${i}" class="item-set" placeholder="Set" value="${safeSet}" autocomplete="off" autocorrect="off" spellcheck="false"
                                    oninput="onSetInput(${i})" onkeydown="onSetKeydown(event,${i})" onblur="closeSetDropdown(${i})">
                                <div class="set-dropdown" id="set-dd-${i}"></div>
                            </div>
                            <input type="text"   id="setNumber-${i}"  class="item-set-number" placeholder="001/100"    value="${safeSetNumber}" autocomplete="off" autocorrect="off" spellcheck="false" oninput="saveData(${i})">
                            <div class="value-wrapper">
                                <span class="value-prefix">$</span>
                                <input type="number" id="value-${i}" class="item-value" placeholder="0.00" value="${safeValue > 0 ? safeValue : ''}" min="0" step="0.01" inputmode="decimal" oninput="saveData(${i})">
                            </div>
                        </div>
                        <div class="input-actions">
                            <div class="action-row-1">
                                <button class="price-btn" id="price-btn-${i}" onclick="fetchPrice(${i})" title="Fetch market price from Pokemon TCG API">💲</button>
                                <button class="tcg-btn"   onclick="searchTCGForItem(${i})" title="Search TCGPlayer">TCG</button>
                                <button class="photo-btn" id="photo-btn-${i}"     onclick="openCamera(${i})"  title="Take / add photo">&#128247;</button>
                                <button class="photo-btn" id="del-photo-btn-${i}" onclick="deletePhoto(${i})" title="Delete photo" style="display:none;color:#e57373;border-color:#e57373;">&#128465;</button>
                                <div class="status-toggle">
                                    <span class="toggle-label wanted-lbl"><span class="cb-full">WANTED</span><span class="cb-short">W</span></span>
                                    <div class="toggle-track ${saved.collected ? 'is-collected' : ''}" id="toggle-${i}"
                                         onclick="toggleCollected(${i})" role="switch" aria-checked="${saved.collected}"
                                         title="Toggle Wanted / Collected"></div>
                                    <span class="toggle-label collected-lbl"><span class="cb-full">COLLECTED</span><span class="cb-short">C</span></span>
                                </div>
                            </div>
                            <div class="action-row-2">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="cbFA-${i}" ${saved.fullArt ? 'checked' : ''} onchange="saveData(${i})">
                                    <span class="cb-full">Full Art</span><span class="cb-short">FA</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="cbHolo-${i}" ${saved.holo ? 'checked' : ''} onchange="saveData(${i})">
                                    <span class="cb-full">Holo</span><span class="cb-short">H</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="cbRevHolo-${i}" ${saved.revHolo ? 'checked' : ''} onchange="saveData(${i})">
                                    <span class="cb-full">Rev-Holo</span><span class="cb-short">RH</span>
                                </label>
                            </div>
                        </div>
                    </div>`;
                currentBody.appendChild(row);
            }
            updateTotalValue();
            initPhotoButtons();
        }

        /* ── Navigation ── */
        function skipToPage() {
            const pageSize   = config.rows * config.cols;
            const totalPages = Math.ceil(config.total / pageSize);
            const page       = Math.max(1, Math.min(parseInt(document.getElementById('gotoPage').value) || 1, totalPages));
            document.getElementById('gotoPage').value = page;
            const body   = document.getElementById(`page-body-${page}`);
            const header = document.getElementById(`page-header-${page}`);
            if (body && !body.classList.contains('open')) togglePage(page);
            if (header) header.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        function findItem() {
            const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
            if (!query) return;
            const num = parseInt(query);
            if (!isNaN(num) && num >= 1 && num <= config.total && query === String(num)) { scrollToRow(num); return; }
            for (let i = 1; i <= config.total; i++) {
                const n  = (document.getElementById(`name-${i}`)?.value      || '').toLowerCase();
                const s  = (document.getElementById(`set-${i}`)?.value       || '').toLowerCase();
                const sn = (document.getElementById(`setNumber-${i}`)?.value || '').toLowerCase();
                if (n.includes(query) || s.includes(query) || sn.includes(query)) { scrollToRow(i); return; }
            }
            alert(`"${query}" not found.`);
        }
        function scrollToRow(id) {
            const pageSize = config.rows * config.cols;
            const page     = Math.floor((id - 1) / pageSize) + 1;
            const body     = document.getElementById(`page-body-${page}`);
            if (body && !body.classList.contains('open')) togglePage(page);
            const el = document.getElementById(`row-${id}`);
            if (el) {
                setTimeout(() => {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('highlight');
                    setTimeout(() => el.classList.remove('highlight'), 2000);
                }, 50);
            }
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            document.getElementById('search-clear-btn').style.display = 'none';
            input.focus();
        }

        /* ── Keyboard ── */
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); findItem(); }
            if (e.key === 'Escape') { e.preventDefault(); clearSearch(); }
        });
        document.getElementById('gotoPage').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); skipToPage(); }
        });

        /* ── Init ── */
        renderList();
        loadLastUpdated();
    </script>
</body>
</html>
